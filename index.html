<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiSaladas - Menu Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: white; }
        .gold-gradient { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); }
        .red-gradient { background: linear-gradient(135deg, #D20A11 0%, #8B0000 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .category-tab:hover { border-bottom: 2px solid #FFD700; }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const MENU_DATA = {
            combos: [
                { id: 'c1', name: "Combo Especial", price: "15,99", items: "1 Salada P + 1 Hot Dog + 1 Coca Lata", icon: "⭐" },
                { id: 'c2', name: "Combo Duplo", price: "15,99", items: "2 Hot Dogs + 2 Refrescos", icon: "🔥" },
                { id: 'c3', name: "Combo Satisfação", price: "16,00", items: "1 Pastel Tradicional + 1 Hot Dog + 1 Refresco", icon: "😋" },
                { id: 'c4', name: "Combo Trio", price: "25,99", items: "Batata Frita + 4 Pastéis + 1 Refresco", icon: "🍟" },
                { id: 'c5', name: "Combo Completo", price: "39,99", items: "2 Hot Dogs + 10 Mini Salgados + Batata Frita + Molho da Casa", icon: "👑" },
                { id: 'c6', name: "Combo Kitudão", price: "38,00", items: "Hambúrguer Kitudão + Batata + Refrigerante", icon: "🍔" }
            ],
            refeicoes: [
                { id: 'r1', name: "Panqueca Completa Sol", price: "26,00", desc: "Carne de sol, molho branco, fritas e salpicão" },
                { id: 'r2', name: "Lasanha Carne/Frango", price: "20,00", desc: "Molho rosé, molho vermelho, presunto e mussarela" },
                { id: 'r3', name: "Macarronada Completa", price: "28,00", desc: "Salpicão, fritas, carne ou frango" },
                { id: 'r4', name: "Prato da Casa", price: "25,00", desc: "Strogonoff de frango, arroz, fritas e salpicão" }
            ],
            doces: [
                { id: 'a1', name: "Açaí no Copo (400ml)", price: "15,00", desc: "Escolha uma fruta: Banana, Morango ou Abacaxi" },
                { id: 'a2', name: "Salada de Fruta Gourmet", price: "10,00", desc: "Creme de Ninho ou Maracujá (400ml)" },
                { id: 'p1', name: "Panqueca Nutella e Morango", price: "15,00", desc: "Nutella premium com morangos frescos e Cream Cheese" }
            ]
        };

        function App() {
            const [activeTab, setActiveTab] = useState('combos');
            const [selectedItem, setSelectedItem] = useState(null);

            const sendWhatsApp = (item) => {
                const msg = `*PEDIDO KISALADAS*%0A%0A*Item:* ${item.name}%0A*Valor:* R$ ${item.price}%0A%0A_Vim pelo site! Gostaria de confirmar._`;
                window.open(`https://wa.me/558398830530?text=${msg}`, '_blank');
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Header com Logo Oficial */}
                    <nav className="p-6 flex flex-col items-center border-b border-white/10 bg-black/50 sticky top-0 z-50 backdrop-blur-md">
                        <div className="flex items-center gap-4 mb-4">
                            {/* Representação da Logo Amarela/Vermelha */}
                            <div className="relative w-16 h-16 bg-[#FFD700] rounded-full flex items-center justify-center border-4 border-[#D20A11] logo-glow">
                                <i data-lucide="utensils-cross" className="text-[#D20A11] w-8 h-8"></i>
                            </div>
                            <div className="text-left">
                                <h1 className="text-2xl font-black tracking-tighter uppercase italic leading-none">KiSaladas</h1>
                                <p className="text-[#FFD700] text-[10px] font-bold tracking-[0.2em]">O SABOR QUE IMPRESSIONA</p>
                            </div>
                        </div>

                        {/* Tabs de Categoria */}
                        <div className="flex gap-6 overflow-x-auto w-full justify-center no-scrollbar py-2">
                            {['combos', 'refeicoes', 'doces'].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`uppercase text-xs font-black tracking-widest pb-1 transition-all ${activeTab === tab ? 'text-[#FFD700] border-b-2 border-[#FFD700]' : 'text-gray-500'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Conteúdo Dinâmico */}
                    <main className="p-6 max-w-5xl mx-auto">
                        <motion.div 
                            key={activeTab}
                            initial={{ opacity: 0, y: 10 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="grid gap-4 sm:grid-cols-2"
                        >
                            {MENU_DATA[activeTab].map((item) => (
                                <div 
                                    key={item.id}
                                    className="glass-card p-5 rounded-2xl flex justify-between items-center group hover:bg-white/5 transition-all"
                                >
                                    <div className="flex-1">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="text-xl">{item.icon || '🍽️'}</span>
                                            <h3 className="font-bold uppercase text-sm tracking-tight">{item.name}</h3>
                                        </div>
                                        <p className="text-gray-500 text-xs leading-relaxed pr-4">
                                            {item.items || item.desc}
                                        </p>
                                        <p className="mt-3 text-[#FFD700] font-black italic">R$ {item.price}</p>
                                    </div>
                                    <button 
                                        onClick={() => sendWhatsApp(item)}
                                        className="bg-[#FFD700] hover:bg-[#D20A11] text-black hover:text-white p-3 rounded-xl transition-colors"
                                    >
                                        <i data-lucide="shopping-cart" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            ))}
                        </motion.div>
                    </main>

                    {/* Footer Estratégico */}
                    <footer className="fixed bottom-0 inset-x-0 p-4 bg-black/80 backdrop-blur-lg border-t border-white/5 flex justify-around items-center">
                        <div className="text-center">
                            <p className="text-[10px] text-gray-500 font-bold uppercase">Tempo Médio</p>
                            <p className="text-xs font-black uppercase tracking-tighter">25-40 min</p>
                        </div>
                        <div className="h-8 w-[1px] bg-white/10"></div>
                        <div className="text-center">
                            <p className="text-[10px] text-gray-500 font-bold uppercase">Status</p>
                            <p className="text-xs font-black uppercase text-green-500 flex items-center gap-1">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Aberto
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Inicializa ícones após render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
