<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiSaladas - O Sabor que Impressiona</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0F0F0B; color: white; -webkit-font-smoothing: antialiased; }
        .glow-yellow { box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .drop-shadow-glow { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
        .food-card { background: #111; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #FFD700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion (Animation) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const COMBOS = [
            { id: 1, name: "Master Chikem Bacon", price: "30,00", desc: "Frango ultra-crocante + Bacon caramelizado + Molho Secreto.", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600", tag: "MAIS VENDIDO", emoji: "🍗" },
            { id: 2, name: "Imperador Saladão", price: "27,00", desc: "Hambúrguer Bovino + Salada Fresca + Batatas Rústicas.", img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600", tag: "EQUILIBRADO", emoji: "🍔" },
            { id: 3, name: "Trinca de Pastéis", price: "33,00", desc: "3 Pastéis Gigantes (Carne/Queijo/Frango) + Guaraná 600ml.", img: "https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=600", tag: "COMPLETO", emoji: "🥟" },
            { id: 4, name: "Macarronada do Tio", price: "30,00", desc: "Massa artesanal + Molho Bolonhesa caseiro de Tradição.", img: "https://images.unsplash.com/photo-1551183053-bf91a1d81141?w=600", tag: "TRADICIONAL", emoji: "🍝" }
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [orderId, setOrderId] = useState('');
            const [selected, setSelected] = useState(null);

            useEffect(() => {
                setOrderId(Math.floor(1000 + Math.random() * 9000).toString());
                lucide.createIcons();
            }, []);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                lucide.createIcons();
            }, [step]);

            const getWaLink = () => {
                if (!selected) return 'https://wa.me/558398830530';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const msg = `*NOVO PEDIDO - KISALADAS*%0A%0A*Horário:* ${time}%0A*Pedido:* %23${orderId}%0A*-------------------------*%0A*Produto:* ${selected.name}%0A*Total:* R$ ${selected.price}%0A*-------------------------*%0A*Gostaria de confirmar meu pedido!*`;
                return `https://wa.me/558398830530?text=${msg}`;
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="fixed top-0 inset-x-0 z-50 bg-black/90 backdrop-blur-xl border-b border-white/5 py-5 px-6 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setStep('welcome')}>
                            <div className="w-12 h-12 bg-[#FFD700] rounded-full flex items-center justify-center glow-yellow"><i data-lucide="utensils" class="text-black w-6 h-6"></i></div>
                            <div>
                                <span className="font-black text-2xl uppercase leading-none block tracking-tighter">KiSaladas</span>
                                <span className="text-[10px] text-[#FFD700] font-black tracking-[0.3em] uppercase opacity-60">Eusébio Digital</span>
                            </div>
                        </div>
                        <span className="text-[10px] font-black uppercase text-[#FFD700] animate-pulse hidden sm:block">ID: #{orderId}</span>
                    </header>

                    <main className="flex-grow pt-32 pb-20 px-6 max-w-7xl mx-auto w-full">
                        <AnimatePresence mode="wait">
                            {step === 'welcome' && (
                                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-20}} className="grid lg:grid-cols-2 gap-12 items-center text-center lg:text-left">
                                    <div>
                                        <span className="bg-[#D20A11] px-5 py-2 inline-block text-[11px] font-black mb-8 italic skew-x-[-15deg]">A Nº 1 DO EUSÉBIO</span>
                                        <h1 className="text-6xl md:text-8xl font-black uppercase italic leading-[0.9] mb-10 tracking-tighter">O SABOR QUE <br /><span className="text-[#FFD700] drop-shadow-glow">DOMINOU.</span></h1>
                                        <p className="text-gray-400 text-xl mb-12 max-w-xl mx-auto lg:mx-0">Descubra por que o Kisaladas é a escolha oficial de quem não abre mão de qualidade bruta e sabor real.</p>
                                        <button onClick={() => setStep('quality')} className="bg-[#FFD700] text-black font-black py-7 px-14 uppercase tracking-widest text-lg shadow-2xl hover:scale-105 transition-all">COMEÇAR PEDIDO</button>
                                    </div>
                                    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=800" className="rounded-[3rem] shadow-2xl grayscale-[0.2] hover:grayscale-0 transition-all duration-700" />
                                </motion.div>
                            )}

                            {step === 'quality' && (
                                <motion.div initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} exit={{opacity:0, x:-20}} className="max-w-4xl mx-auto">
                                    <h2 className="text-5xl md:text-8xl font-black uppercase italic tracking-tighter mb-16 leading-tight">NOSSO <span className="text-[#D20A11]">PADRÃO</span> É ABSOLUTO.</h2>
                                    <div className="grid sm:grid-cols-2 gap-12 mb-16">
                                        <div className="flex gap-6"><i data-lucide="flame" class="text-[#FFD700] w-10 h-10"></i><div><h4 className="font-black uppercase mb-2">CHAPA DE ELITE</h4><p className="text-gray-500 text-sm">Carnes seladas em alta temperatura para máxima suculência.</p></div></div>
                                        <div className="flex gap-6"><i data-lucide="zap" class="text-[#FFD700] w-10 h-10"></i><div><h4 className="font-black uppercase mb-2">ENTREGA NINJA</h4><p className="text-gray-500 text-sm">Seu lanche chega quente e rápido no conforto da sua casa.</p></div></div>
                                    </div>
                                    <button onClick={() => setStep('menu')} className="w-full bg-[#FFD700] text-black font-black py-8 uppercase tracking-widest text-xl shadow-2xl">CONHECER O MENU</button>
                                </motion.div>
                            )}

                            {step === 'menu' && (
                                <motion.div initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} exit={{opacity:0, scale:1.05}}>
                                    <h2 className="text-4xl md:text-6xl font-black text-center mb-16 italic uppercase tracking-tighter">ESCOLHA SUA <span className="text-[#FFD700]">CONQUISTA.</span></h2>
                                    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
                                        {COMBOS.map(c => (
                                            <div key={c.id} onClick={() => setSelected(c)} className={`food-card cursor-pointer rounded-3xl overflow-hidden ${selected?.id === c.id ? 'border-[#FFD700] scale-105 shadow-2xl' : 'opacity-60 grayscale'}`}>
                                                <img src={c.img} className="h-64 w-full object-cover" />
                                                <div className="p-6">
                                                    <span className="text-4xl block mb-2">{c.emoji}</span>
                                                    <h3 className="font-black uppercase italic tracking-tighter text-xl mb-2">{c.name}</h3>
                                                    <p className="text-[#FFD700] font-black text-2xl tracking-tighter">R$ {c.price}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <button disabled={!selected} onClick={() => setStep('delivery')} className={`w-full py-8 text-xl font-black uppercase tracking-widest ${selected ? 'bg-[#FFD700] text-black' : 'bg-white/5 text-gray-700'}`}>FINALIZAR ESCOLHA</button>
                                </motion.div>
                            )}

                            {step === 'delivery' && (
                                <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="text-center max-w-3xl mx-auto">
                                    <h2 className="text-6xl md:text-8xl font-black uppercase mb-10 italic tracking-tighter">MISSÃO <br/><span className="text-[#FFD700]">FINALIZADA.</span></h2>
                                    <div className="bg-[#111] p-10 rounded-[2.5rem] border border-white/5 mb-12 text-left">
                                        <p className="text-gray-500 font-black uppercase text-[10px] mb-4">DETALHES DO PEDIDO #{orderId}</p>
                                        <p className="text-3xl font-black uppercase italic mb-2">{selected?.name}</p>
                                        <p className="text-5xl font-black text-[#FFD700]">R$ {selected?.price}</p>
                                    </div>
                                    <a href={getWaLink()} target="_blank" className="bg-[#25D366] text-white font-black py-10 px-12 block uppercase tracking-widest text-2xl shadow-2xl hover:scale-105 transition-all rounded-3xl">CONCLUIR NO WHATSAPP</a>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <footer className="py-12 px-6 border-t border-white/5 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.5em]">© 2024 KiSaladas Authority - Eusébio, CE</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
