<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiSaladas Premium - Lagoa Seca</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FFD700',
                        secondary: '#D20A11',
                        bg: '#0F0F0B',
                    }
                }
            }
        }
    </script>
    
    <style type="text/css">
        @layer base {
            body {
                background-color: #0F0F0B;
                color: white;
                font-family: 'Inter', sans-serif;
                -webkit-font-smoothing: antialiased;
                overflow-x: hidden;
            }
        }

        .glow-primary {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .glow-text-primary {
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .luxury-card {
            background-color: #0D0D0D;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.01);
        }

        .luxury-card:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-0.75rem);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), inset 0 0 60px rgba(255, 215, 0, 0.04);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .animate-marquee {
            display: flex;
            animation: marquee 25s linear infinite;
        }

        /* Customize scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F0F0B; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FFD700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Scripts: React, ReactDOM, Babel, Framer Motion, Lucide -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Lucide Icon Component
        const Icon = ({ name, ...props }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon {...props} /> : null;
        };

        const PRODUCTS = [
            { 
                id: 101, 
                name: "Combo Kitudão", 
                price: 38.00, 
                desc: "Hambúrguer Kitudão + Batata Frita + Refrigerante Lata.", 
                image: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=800",
                category: 'combo',
                tag: "MAIS PEDIDO"
            },
            { 
                id: 102, 
                name: "Combo 3 Pastéis", 
                price: 33.00, 
                desc: "3 Pastéis Tradicionais + 1 Guaraná 600ml.", 
                category: 'combo'
            },
            { 
                id: 103, 
                name: "Combo Irresistível", 
                price: 30.00, 
                desc: "Macarronada + Salada de Frutas 400ml + Fanta de Laranja ou Uva.", 
                category: 'combo'
            },
            { id: 201, name: "Kitudão Premium", price: 23.00, desc: "O burger mais completo: Carne, ovo, bacon, frango, salsicha e mais.", image: "https://images.unsplash.com/photo-1571091718767-18b5c1457add?q=80&w=800", category: 'burger', tag: "O MONSTRO" },
            { id: 202, name: "Sol Burger", price: 20.00, desc: "Carne de sol desfiada, bacon crocante e cream cheese original.", category: 'burger' },
            { id: 301, name: "Panqueca Completa Sol", price: 26.00, desc: "Carne de sol, molho branco, batata frita e salpicão.", category: 'prato' },
            { id: 401, name: "Açaí Trufado 400ml", price: 17.00, desc: "Açaí puro com cremes e frutas selecionadas.", category: 'sobremesa', tag: "GELADINHO" },
            { id: 501, name: "Pastel Especial", price: 10.00, desc: "Pastéis fritos na hora com recheios premium.", category: 'pastel' }
        ];

        const Navbar = ({ onOpenMenu, onOpenAbout, isOpen, cartCount }) => (
            <header className="fixed top-0 inset-x-0 z-50 bg-[#0F0F0B]/90 backdrop-blur-2xl border-b border-white/10 py-6 px-4 md:px-10 flex justify-between items-center">
                <div className="flex items-center gap-4 group cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                    <div className="w-10 h-10 md:w-14 md:h-14 bg-primary rounded-full border-[3px] border-secondary flex items-center justify-center glow-primary">
                        <div className="text-secondary font-black text-xl md:text-2xl italic">K</div>
                    </div>
                    <div>
                        <h1 className="font-display font-black text-xl md:text-2xl uppercase tracking-tighter leading-none italic">Ki<span className="text-primary italic">Saladas</span></h1>
                    </div>
                </div>
                
                <div className="hidden lg:flex items-center gap-10 text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">
                    <a href="#menu" className="hover:text-primary transition-colors">Cardápio</a>
                    <button onClick={onOpenAbout} className="hover:text-primary transition-colors uppercase">Sobre Nós</button>
                    <a href="#contato" className="hover:text-primary transition-colors">Contato</a>
                </div>

                <div className="flex items-center gap-4">
                    <div className="hidden sm:flex items-center gap-2">
                        <div className={`w-2 h-2 rounded-full ${isOpen ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                        <span className={`text-[10px] font-black uppercase ${isOpen ? 'text-green-500' : 'text-red-500'}`}>{isOpen ? 'Aberto' : 'Fechado'}</span>
                    </div>
                    <button onClick={onOpenMenu} className="relative bg-zinc-900 border border-white/10 w-12 h-12 rounded-xl flex items-center justify-center">
                        <Icon name="ShoppingBag" size={20} className="text-primary" />
                        {cartCount > 0 && <span className="absolute -top-1 -right-1 bg-secondary text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-zinc-950">{cartCount}</span>}
                    </button>
                </div>
            </header>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('all');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => {
                const checkStatus = () => {
                    const now = new Date();
                    const day = now.getDay();
                    const hour = now.getHours();
                    let open = false;
                    if (day >= 1 && day <= 5) open = hour >= 2 && hour < 22;
                    else if (day === 6) open = hour >= 11 && hour < 17;
                    setIsOpen(open);
                };
                checkStatus();
                const i = setInterval(checkStatus, 60000);
                return () => clearInterval(i);
            }, []);

            const filtered = activeTab === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeTab);
            const total = cart.reduce((acc, i) => acc + (i.product.price * i.quantity), 0);
            const count = cart.reduce((acc, i) => acc + i.quantity, 0);

            const addToCart = (p) => {
                setCart(prev => {
                    const ex = prev.find(item => item.product.id === p.id);
                    if (ex) return prev.map(item => item.product.id === p.id ? {...item, quantity: item.quantity + 1} : item);
                    return [...prev, { product: p, quantity: 1 }];
                });
                setIsCartOpen(true);
            };

            const getMsg = () => {
                let text = "🍟 *PEDIDO KISALADAS* 🍟\n\n";
                cart.forEach(i => text += `• *${i.quantity}x* ${i.product.name} - R$ ${(i.product.price * i.quantity).toFixed(2)}\n`);
                text += `\n💰 *Total: R$ ${total.toFixed(2)}*`;
                return `https://wa.me/5585998830530?text=${encodeURIComponent(text)}`;
            };

            return (
                <div className="min-h-screen">
                    <Navbar onOpenMenu={() => setIsCartOpen(true)} onOpenAbout={() => setIsAboutOpen(true)} isOpen={isOpen} cartCount={count} />

                    <main>
                        {/* HERO */}
                        <section className="pt-48 pb-24 px-6 md:px-12 text-center lg:text-left max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
                            <motion.div initial={{opacity:0, x:-50}} animate={{opacity:1, x:0}}>
                                <span className="bg-secondary px-4 py-1 text-[10px] font-black mb-6 inline-block uppercase tracking-widest italic skew-x-[-15deg]">Lagoa Seca - PB</span>
                                <h2 className="text-6xl md:text-8xl font-display font-black uppercase italic leading-none tracking-tighter mb-8">O SABOR QUE <br /><span className="text-primary glow-text-primary">VICIA.</span></h2>
                                <p className="text-gray-400 text-lg mb-12 max-w-xl">Qualidade premium em cada mordida. O lanche que você merece, do jeito que você gosta.</p>
                                <button onClick={() => document.getElementById('menu').scrollIntoView({behavior:'smooth'})} className="bg-primary text-black font-black py-5 px-12 rounded-2xl text-lg uppercase tracking-widest hover:bg-white transition-all shadow-2xl skew-x-[-5deg]">VER CARDÁPIO</button>
                            </motion.div>
                            <motion.div initial={{opacity:0, scale:0.8}} animate={{opacity:1, scale:1}} className="relative aspect-square max-w-[500px] mx-auto overflow-hidden rounded-[3rem] border border-white/5">
                                <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=800" className="w-full h-full object-cover" />
                            </motion.div>
                        </section>

                        {/* MENU */}
                        <section id="menu" className="py-32 px-6 max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                                <h2 className="text-5xl font-display font-black italic uppercase tracking-tighter">EXPLORE O <span className="text-primary">MENU.</span></h2>
                                <div className="flex flex-wrap gap-2">
                                    {['all', 'combo', 'burger', 'pastel', 'sobremesa'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${activeTab === t ? 'bg-primary text-black' : 'text-gray-500 bg-zinc-900'}`}>{t === 'all' ? 'Tudo' : t}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filtered.map(p => (
                                    <div key={p.id} className="luxury-card p-8 flex flex-col justify-between group">
                                        <div>
                                            <div className="flex justify-between items-start mb-4">
                                                <h4 className="text-2xl font-display font-black uppercase italic tracking-tighter group-hover:text-primary transition-colors">{p.name}</h4>
                                                {p.tag && <span className="bg-secondary text-[8px] px-2 py-1 font-black skew-x-[-10deg] uppercase">{p.tag}</span>}
                                            </div>
                                            <p className="text-gray-500 text-sm mb-8 leading-relaxed">{p.desc}</p>
                                        </div>
                                        <div className="flex justify-between items-end">
                                            <span className="text-primary font-black text-3xl italic tracking-tighter">R$ {p.price.toFixed(2)}</span>
                                            <button onClick={() => addToCart(p)} className="bg-primary w-12 h-12 rounded-xl flex items-center justify-center text-black hover:scale-110 transition-transform"><Icon name="ShoppingBag" size={20} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* FOOTER / CONTACT */}
                        <section id="contato" className="py-32 px-6 bg-[#0a0a09] border-t border-white/5 text-center">
                            <div className="max-w-xl mx-auto">
                                <h3 className="text-primary font-black text-xs uppercase tracking-[0.4em] mb-6 italic">Contato</h3>
                                <h2 className="text-5xl font-display font-black uppercase italic mb-10">ONDE <span className="text-primary">ESTAMOS.</span></h2>
                                <p className="text-gray-400 font-bold mb-8">R. João Eusébio dos Santos, 127, Lagoa Seca - PB</p>
                                <div className="bg-primary/5 p-8 rounded-[2rem] border border-primary/10">
                                    <h4 className="font-display font-black uppercase text-xl mb-6 flex items-center justify-center gap-2"><Icon name="Clock" size={20} className="text-primary" /> Horários</h4>
                                    <div className="space-y-2 opacity-60 text-sm font-bold uppercase tracking-widest">
                                        <p>Seg - Sex: 02:00 - 22:00</p>
                                        <p>Sáb: 11:00 - 17:00</p>
                                        <p>Dom: Fechado</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* CART DRAWER */}
                    <AnimatePresence>
                        {isCartOpen && (
                            <div className="fixed inset-0 z-[110] flex justify-end">
                                <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} onClick={() => setIsCartOpen(false)} className="absolute inset-0 bg-black/80 backdrop-blur-md" />
                                <motion.div initial={{x:'100%'}} animate={{x:0}} exit={{x:'100%'}} className="relative w-full max-w-md bg-zinc-950 border-l border-white/10 h-full flex flex-col p-8">
                                    <div className="flex justify-between items-center mb-12">
                                        <h2 className="font-display font-black uppercase text-3xl italic tracking-tighter">Sacola</h2>
                                        <button onClick={() => setIsCartOpen(false)}><Icon name="X" size={24} /></button>
                                    </div>
                                    <div className="flex-grow overflow-y-auto space-y-6">
                                        {cart.length === 0 ? <p className="text-center text-gray-500 py-10">Vazia.</p> : cart.map(item => (
                                            <div key={item.product.id} className="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                                                <div>
                                                    <h4 className="font-black uppercase text-xs">{item.product.name}</h4>
                                                    <span className="text-primary font-black">R$ {item.product.price.toFixed(2)}</span>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <span className="font-black text-sm">{item.quantity}x</span>
                                                    <button onClick={() => setCart(c => c.filter(x => x.product.id !== item.product.id))} className="text-secondary"><Icon name="Trash2" size={16} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {cart.length > 0 && (
                                        <div className="pt-8 border-t border-white/10 space-y-6">
                                            <div className="flex justify-between items-end"><span className="text-gray-500 font-bold uppercase text-xs">Total</span><span className="text-primary font-black text-4xl italic">R$ {total.toFixed(2)}</span></div>
                                            <a href={getMsg()} target="_blank" className="w-full bg-primary text-black font-black py-5 rounded-2xl block text-center uppercase tracking-widest shadow-2xl">PEDIR NO WHATSAPP</a>
                                        </div>
                                    )}
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    {/* ABOUT MODAL */}
                    <AnimatePresence>
                        {isAboutOpen && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-6">
                                <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} onClick={() => setIsAboutOpen(false)} className="absolute inset-0 bg-black/90 backdrop-blur-xl" />
                                <motion.div initial={{scale:0.9, opacity:0}} animate={{scale:1, opacity:1}} exit={{scale:0.9, opacity:0}} className="relative w-full max-w-lg bg-zinc-900 border border-white/10 p-12 rounded-[3rem] shadow-2xl overflow-hidden">
                                     <button onClick={() => setIsAboutOpen(false)} className="absolute top-8 right-8 text-gray-500"><Icon name="X" size={24} /></button>
                                     <span className="text-primary font-black text-xs uppercase tracking-[0.4em] mb-4 block italic">Nossa História</span>
                                     <h2 className="text-5xl font-display font-black uppercase italic tracking-tighter mb-8 leading-none">KISALADAS.</h2>
                                     <p className="text-gray-300 mb-8 leading-relaxed">Elevando o conceito de lanche em Lagoa Seca com qualidade premium e sabor incomparável.</p>
                                     <p className="font-black text-white italic border-l-2 border-primary pl-4 mb-10">"Criamos momentos através do sabor."</p>
                                     <button onClick={() => setIsAboutOpen(false)} className="bg-white/5 border border-white/10 py-4 px-8 rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-white/10 transition-all outline-none">
                                         <Icon name="ArrowLeft" size={14} /> Voltar
                                     </button>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
