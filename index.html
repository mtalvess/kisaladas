<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KiSaladas Premium - O Sabor que Impressiona</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#0F0F0B;
  color:white;
  font-family: 'Inter', sans-serif;
}
.loading-screen{
  position:fixed;
  inset:0;
  background:#0F0F0B;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="loading" class="loading-screen">
  <div class="flex flex-col items-center">
    <div class="w-16 h-16 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-yellow-400 font-black uppercase tracking-[0.3em] text-xs">
      Carregando KiSaladas...
    </p>
  </div>
</div>

<div id="root"></div>

<!-- React estável -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
const e = React.createElement;

function App() {

  React.useEffect(() => {
    const loader = document.getElementById("loading");
    if(loader){
      loader.style.opacity = "0";
      setTimeout(()=> loader.remove(),500);
    }
  },[]);

  return e("div",{className:"min-h-screen flex items-center justify-center text-center px-6"},
    e("div",null,
      e("h1",{className:"text-6xl font-black text-yellow-400 mb-6 italic"},
        "KiSaladas Premium"
      ),
      e("p",{className:"text-gray-400 text-lg"},
        "Seu site está funcionando corretamente no GitHub Pages."
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>

</body>
</html>
