<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiSaladas Premium - Lagoa Seca</title>
    
    <!-- URL de Pre-load para fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#FFD700',
                        secondary: '#D20A11',
                        bg: '#0F0F0B',
                    }
                }
            }
        }
    </script>
    
    <style type="text/css">
        @layer base {
            body {
                background-color: #0F0F0B;
                color: white;
                font-family: 'Inter', sans-serif;
                margin: 0;
            }
        }

        .glow-primary { box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .luxury-card {
            background-color: #111;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2.5rem;
            transition: all 0.5s ease;
        }
        .luxury-card:hover {
            border-color: rgba(255, 215, 0, 0.2);
            transform: translateY(-8px);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            animation: marquee 30s linear infinite;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0F0F0B;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="text-primary font-black animate-pulse">CARREGANDO...</div>
    </div>
    
    <div id="root"></div>

    <!-- Bibliotecas Necessárias -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Correção para o Framer Motion no ambiente de CDN
        const motion = window.Motion?.motion || window.framerMotion?.motion || (({children, ...props}) => <div {...props}>{children}</div>);
        const AnimatePresence = window.Motion?.AnimatePresence || window.framerMotion?.AnimatePresence || (({children}) => children);

        // Adaptador de Ícones
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name.toLowerCase()} style={{ width: size, height: size }} className={className}></i>;
        };

        const PRODUCTS = [
            { id: 1, name: "Combo Kitudão", price: 38.00, desc: "Hambúrguer Kitudão + Batata Frita + Refrigerante Lata.", category: 'combo', tag: "MAIS PEDIDO" },
            { id: 2, name: "Kitudão Premium", price: 23.00, desc: "Pão, hambúrguer, ovo, bacon, frango, calabresa, mussarela e molho especial.", category: 'burger', tag: "O MONSTRO" },
            { id: 3, name: "Sol Burger", price: 20.00, desc: "Pão, carne de sol desfiada, bacon crocante e cream cheese.", category: 'burger' },
            { id: 4, name: "Pastel Especial", price: 10.00, desc: "Carne com Queijo, Bacon ou Cream Cheese.", category: 'pastel' },
            { id: 5, name: "Açaí Trufado 400ml", price: 17.00, desc: "Açaí puro com cremes gourmet e frutas.", category: 'sobremesa' },
            { id: 6, name: "Mini Salgados (20 un)", price: 10.00, desc: "Coxinhas de frango ou Bolinhas de queijo.", category: 'pastel' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('all');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);
            const [isOpen, setIsOpen] = useState(false);

            useEffect(() => {
                // Remover tela de carregamento
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';

                // Lógica de Horário
                const checkStore = () => {
                    const now = new Date();
                    const day = now.getDay();
                    const hour = now.getHours();
                    const min = now.getMinutes();
                    const totalMin = hour * 60 + min;
                    let opened = false;
                    if (day >= 1 && day <= 5) opened = totalMin >= 120 && totalMin < 1320; // 02:00 - 22:00
                    else if (day === 6) opened = totalMin >= 660 && totalMin < 1020; // 11:00 - 17:00
                    setIsOpen(opened);
                };
                checkStore();
                const timer = setInterval(checkStore, 60000);
                return () => clearInterval(timer);
            }, []);

            const addToCart = (p) => {
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id);
                    if (exists) return prev.map(item => item.id === p.id ? {...item, qty: item.qty + 1} : item);
                    return [...prev, {...p, qty: 1}];
                });
                setIsCartOpen(true);
            }

            const total = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 inset-x-0 z-50 bg-[#0F0F0B]/90 backdrop-blur-xl border-b border-white/10 h-20 md:h-24 px-6 md:px-12 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 md:w-12 md:h-12 bg-primary rounded-full flex items-center justify-center font-black text-black">K</div>
                            <h1 className="font-display font-black text-xl md:text-2xl italic">KI<span className="text-primary">SALADAS</span></h1>
                        </div>
                        <div className="flex items-center gap-4 md:gap-8">
                            <button onClick={() => setIsAboutOpen(true)} className="hidden md:block text-[10px] uppercase font-black tracking-widest text-gray-400 hover:text-primary">Sobre Nós</button>
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${isOpen ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                <span className={`text-[10px] font-black uppercase ${isOpen ? 'text-green-500' : 'text-red-500'}`}>{isOpen ? 'Aberto' : 'Fechado'}</span>
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="relative bg-zinc-900 w-12 h-12 rounded-xl flex items-center justify-center border border-white/10 hover:border-primary/50">
                                <Icon name="shopping-bag" size={20} className="text-primary" />
                                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-secondary text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
                            </button>
                        </div>
                    </header>

                    {/* Hero */}
                    <section className="pt-48 pb-20 px-6 max-w-7xl mx-auto text-center">
                        <span className="text-primary font-black tracking-[0.5em] uppercase text-xs mb-6 block">Lagoa Seca - PB</span>
                        <h2 className="text-6xl md:text-9xl font-display font-black italic uppercase leading-none tracking-tighter mb-10">O SABOR <br/> <span className="text-primary">PREMIUM.</span></h2>
                        <button onClick={() => document.getElementById('menu').scrollIntoView({behavior:'smooth'})} className="bg-primary text-black font-black px-12 py-6 rounded-2xl text-sm uppercase tracking-widest hover:scale-105 transition-all">VER CARDÁPIO</button>
                    </section>

                    {/* Menu */}
                    <section id="menu" className="py-20 px-6 max-w-7xl mx-auto">
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {PRODUCTS.map(p => (
                                <div key={p.id} className="luxury-card p-8 flex flex-col justify-between h-[320px]">
                                    <div>
                                        <div className="flex justify-between mb-4">
                                            <span className="text-[10px] text-primary/50 font-black uppercase tracking-widest">{p.category}</span>
                                            {p.tag && <span className="bg-secondary text-white text-[8px] font-black px-2 py-1 italic uppercase tracking-widest">{p.tag}</span>}
                                        </div>
                                        <h3 className="text-2xl font-display font-black uppercase italic mb-3">{p.name}</h3>
                                        <p className="text-gray-500 text-sm leading-relaxed">{p.desc}</p>
                                    </div>
                                    <div className="flex justify-between items-end mt-6">
                                        <div className="text-primary font-black text-3xl">R$ {p.price.toFixed(2)}</div>
                                        <button onClick={() => addToCart(p)} className="bg-primary w-12 h-12 rounded-xl flex items-center justify-center text-black hover:scale-110 transition-all"><Icon name="plus" /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Location & Hours */}
                    <section className="py-20 px-6 bg-zinc-950/50 border-t border-white/5">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-12">
                            <div className="bg-[#111] p-10 rounded-[2.5rem] border border-white/5">
                                <h4 className="font-display font-black text-xl uppercase mb-8 flex items-center gap-3"><Icon name="map-pin" className="text-primary" /> Localização</h4>
                                <p className="text-gray-400 font-bold mb-4">R. João Eusébio dos Santos, 127</p>
                                <p className="text-gray-500 text-sm">Lagoa Seca - PB, 58117-000, Brasil</p>
                            </div>
                            <div className="bg-[#111] p-10 rounded-[2.5rem] border border-white/5">
                                <h4 className="font-display font-black text-xl uppercase mb-8 flex items-center gap-3"><Icon name="clock" className="text-primary" /> Horários</h4>
                                <div className="space-y-3">
                                    <div className="flex justify-between text-xs font-bold py-2 border-b border-white/5"><span>SEG - SEX</span><span>02:00 - 22:00</span></div>
                                    <div className="flex justify-between text-xs font-bold py-2 border-b border-white/5"><span>SÁBADO</span><span>11:00 - 17:00</span></div>
                                    <div className="flex justify-between text-xs font-bold py-2 border-b border-white/5 text-gray-600"><span>DOMINGO</span><span>FECHADO</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Modal Carrinho */}
                    <AnimatePresence>
                        {isCartOpen && (
                            <div className="fixed inset-0 z-[100] flex justify-end">
                                <div onClick={() => setIsCartOpen(false)} className="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
                                <div className="relative w-full max-w-md bg-zinc-950 border-l border-white/10 h-full flex flex-col p-8">
                                    <div className="flex justify-between items-center mb-10">
                                        <h2 className="font-display font-black text-2xl uppercase italic">Sacola</h2>
                                        <button onClick={() => setIsCartOpen(false)}><Icon name="x" /></button>
                                    </div>
                                    <div className="flex-grow overflow-y-auto">
                                        {cart.length === 0 ? <p className="text-gray-500 text-center py-20 uppercase font-black tracking-widest">Vazia</p> : cart.map(item => (
                                            <div key={item.id} className="flex justify-between mb-6 pb-6 border-b border-white/5">
                                                <div>
                                                    <h4 className="font-black text-sm uppercase">{item.name}</h4>
                                                    <span className="text-primary text-xs font-bold">R$ {item.price.toFixed(2)} x {item.qty}</span>
                                                </div>
                                                <button onClick={() => setCart(prev => prev.filter(i => i.id !== item.id))} className="text-gray-600 hover:text-red-500"><Icon name="trash-2" size={16} /></button>
                                            </div>
                                        ))}
                                    </div>
                                    {cart.length > 0 && (
                                        <div className="pt-8 border-t border-white/10">
                                            <div className="flex justify-between mb-6"><span className="font-bold grey-400">TOTAL</span><span className="text-primary font-black text-2xl">R$ {total.toFixed(2)}</span></div>
                                            <a href={`https://wa.me/5585998830530?text=${encodeURIComponent("Pedido KiSaladas: " + total.toFixed(2))}`} className="bg-primary text-black font-black w-full py-5 rounded-xl block text-center uppercase tracking-widest">PEDIR NO WHATSAPP</a>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </AnimatePresence>

                    {/* Modal Sobre */}
                    <AnimatePresence>
                        {isAboutOpen && (
                            <div className="fixed inset-0 z-[120] flex items-center justify-center p-6">
                                <div onClick={() => setIsAboutOpen(false)} className="absolute inset-0 bg-black/90 backdrop-blur-xl"></div>
                                <div className="relative w-full max-w-lg bg-zinc-900 p-10 md:p-12 rounded-[3rem] border border-white/10">
                                    <h2 className="text-4xl font-display font-black uppercase italic mb-6">SOBRE A <span className="text-primary">KISALADAS.</span></h2>
                                    <p className="text-gray-300 leading-relaxed mb-6">Elevando o conceito de lanche em Lagoa Seca com qualidade premium e sabor incomparável.</p>
                                    <p className="font-bold text-primary italic border-l-2 border-primary pl-4 mb-10">"Criamos momentos através do sabor."</p>
                                    <button onClick={() => setIsAboutOpen(false)} className="bg-white/5 border border-white/10 py-4 px-8 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 flex items-center gap-2">Voltar</button>
                                </div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
